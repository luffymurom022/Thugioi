openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: THÚ GIỚI AI - World Creature Simulation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: creatures
  - name: zones
  - name: breeding
  - name: history
  - name: dashboard
  - name: evolution
  - name: genetics
  - name: kingdoms
  - name: territories
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get world dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /creatures:
    get:
      operationId: listCreatures
      tags: [creatures]
      summary: List all creature species
      parameters:
        - name: zone
          in: query
          schema:
            type: string
        - name: element
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of creatures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Creature"

  /creatures/{id}:
    get:
      operationId: getCreature
      tags: [creatures]
      summary: Get creature detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Creature detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Creature"
        "404":
          description: Not found

  /zones:
    get:
      operationId: listZones
      tags: [zones]
      summary: List all zones with current populations
      responses:
        "200":
          description: List of zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"

  /zones/{id}:
    get:
      operationId: getZone
      tags: [zones]
      summary: Get zone detail with creatures
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Zone detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoneDetail"
        "404":
          description: Not found

  /breeding:
    post:
      operationId: breedCreatures
      tags: [breeding]
      summary: Breed two creatures to create a new species
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreedingInput"
      responses:
        "201":
          description: New creature born
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BreedingResult"
        "400":
          description: Invalid breeding pair

  /history:
    get:
      operationId: listHistory
      tags: [history]
      summary: Get world history logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: History log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"

  /simulation/tick:
    post:
      operationId: simulationTick
      tags: [dashboard]
      summary: Manually trigger a simulation tick
      responses:
        "200":
          description: Tick result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TickResult"

  /evolution-paths:
    get:
      operationId: listEvolutionPaths
      tags: [evolution]
      summary: Get all evolution paths with conditions
      responses:
        "200":
          description: Evolution paths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EvolutionPath"

  /territories:
    get:
      operationId: listTerritories
      tags: [territories]
      summary: List all territories with resources
      responses:
        "200":
          description: Territory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Territory"

  /kingdoms:
    get:
      operationId: listKingdoms
      tags: [kingdoms]
      summary: List all beast kingdoms ranked by influence
      responses:
        "200":
          description: Kingdom list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BeastKingdom"

  /kingdoms/{id}:
    get:
      operationId: getKingdom
      tags: [kingdoms]
      summary: Get kingdom detail with packs, territories, and relations
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kingdom detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeastKingdomDetail"
        "404":
          description: Not found

  /packs:
    get:
      operationId: listPacks
      tags: [kingdoms]
      summary: List all active packs
      responses:
        "200":
          description: Pack list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pack"

  /kingdom-relations:
    get:
      operationId: listKingdomRelations
      tags: [kingdoms]
      summary: List all diplomacy relations between kingdoms
      responses:
        "200":
          description: Relation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KingdomRelation"

  /genetics/preview:
    post:
      operationId: previewGenetics
      tags: [genetics]
      summary: Preview DNA fusion of two creatures without saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreedingInput"
      responses:
        "200":
          description: Predicted child DNA and traits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneticsPreview"
        "400":
          description: Invalid input

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Creature:
      type: object
      required: [id, name, rank, rankLevel, element, habitat, population, lifespan, reproductionRate, description, status, isHybrid, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        rank:
          type: string
        rankLevel:
          type: integer
        element:
          type: string
        habitat:
          type: string
        population:
          type: integer
        lifespan:
          type: integer
        reproductionRate:
          type: number
        description:
          type: string
        status:
          type: string
        isHybrid:
          type: boolean
        parentA:
          type: ["string", "null"]
        parentB:
          type: ["string", "null"]
        createdAt:
          type: string
        energy:
          type: integer
        hunger:
          type: integer
        ageTicks:
          type: integer
        gender:
          type: string
        preySpecies:
          type: string
        predatorSpecies:
          type: string
        generation:
          type: integer
        huntSuccesses:
          type: integer
        evolutionStage:
          type: integer
        evolutionChain:
          type: string
        dietType:
          type: string
        maxPopulation:
          type: integer
        mutationChance:
          type: number
        isMutant:
          type: boolean
        strength:
          type: integer
        agility:
          type: integer
        intelligence:
          type: integer
        vitality:
          type: integer
        sizeClass:
          type: string
        bloodline:
          type: string

    Zone:
      type: object
      required: [id, name, temperature, resources, capacity, currentPopulation]
      properties:
        id:
          type: integer
        name:
          type: string
        temperature:
          type: number
        resources:
          type: string
        capacity:
          type: integer
        currentPopulation:
          type: integer
        description:
          type: string

    ZoneDetail:
      type: object
      required: [id, name, temperature, resources, capacity, currentPopulation, creatures]
      properties:
        id:
          type: integer
        name:
          type: string
        temperature:
          type: number
        resources:
          type: string
        capacity:
          type: integer
        currentPopulation:
          type: integer
        description:
          type: string
        creatures:
          type: array
          items:
            $ref: "#/components/schemas/Creature"

    BreedingInput:
      type: object
      required: [creatureAId, creatureBId]
      properties:
        creatureAId:
          type: integer
        creatureBId:
          type: integer

    BreedingResult:
      type: object
      required: [newCreature, message]
      properties:
        newCreature:
          $ref: "#/components/schemas/Creature"
        message:
          type: string
        isMutant:
          type: boolean
        bloodline:
          type: string

    HistoryEntry:
      type: object
      required: [id, worldDay, eventType, description, createdAt]
      properties:
        id:
          type: integer
        worldDay:
          type: integer
        eventType:
          type: string
        description:
          type: string
        createdAt:
          type: string

    DashboardSummary:
      type: object
      required: [totalSpecies, totalPopulation, extinctSpecies, livingSpecies, worldDay, zoneStats, recentEvents]
      properties:
        totalSpecies:
          type: integer
        totalPopulation:
          type: integer
        extinctSpecies:
          type: integer
        livingSpecies:
          type: integer
        worldDay:
          type: integer
        zoneStats:
          type: array
          items:
            $ref: "#/components/schemas/ZoneStat"
        recentEvents:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntry"
        strongestSpeciesName:
          type: ["string", "null"]
        mostPopulousSpeciesName:
          type: ["string", "null"]
        mostPopulousCount:
          type: ["integer", "null"]
        newestSpeciesName:
          type: ["string", "null"]
        evolvingSpeciesCount:
          type: ["integer", "null"]
        mutatedSpeciesCount:
          type: ["integer", "null"]
        totalKingdoms:
          type: ["integer", "null"]
        strongestKingdomName:
          type: ["string", "null"]
        richestKingdomName:
          type: ["string", "null"]
        largestKingdomName:
          type: ["string", "null"]

    ZoneStat:
      type: object
      required: [zoneId, zoneName, population, speciesCount, capacity]
      properties:
        zoneId:
          type: integer
        zoneName:
          type: string
        population:
          type: integer
        speciesCount:
          type: integer
        capacity:
          type: integer

    TickResult:
      type: object
      required: [worldDay, events, populations]
      properties:
        worldDay:
          type: integer
        events:
          type: array
          items:
            type: string
        populations:
          type: array
          items:
            $ref: "#/components/schemas/CreaturePopulation"

    CreaturePopulation:
      type: object
      required: [id, name, population, status]
      properties:
        id:
          type: integer
        name:
          type: string
        population:
          type: integer
        status:
          type: string

    EvolutionPath:
      type: object
      required: [id, fromSpecies, toSpecies, toRank, toRankLevel, toElement, minPopulation, minHuntSuccesses, minAgeTicks, toDescription]
      properties:
        id:
          type: integer
        fromSpecies:
          type: string
        toSpecies:
          type: string
        toRank:
          type: string
        toRankLevel:
          type: integer
        toElement:
          type: string
        toDescription:
          type: string
        minPopulation:
          type: integer
        minHuntSuccesses:
          type: integer
        minAgeTicks:
          type: integer
        createdAt:
          type: string

    Territory:
      type: object
      required: [id, zoneName, food, water, mineral, spirit, foodMax, waterMax, mineralMax, spiritMax, climate, contested, createdAt]
      properties:
        id:
          type: integer
        zoneName:
          type: string
        food:
          type: integer
        water:
          type: integer
        mineral:
          type: integer
        spirit:
          type: integer
        foodMax:
          type: integer
        waterMax:
          type: integer
        mineralMax:
          type: integer
        spiritMax:
          type: integer
        climate:
          type: string
        dominantSpecies:
          type: ["string", "null"]
        controllingKingdom:
          type: ["string", "null"]
        contested:
          type: boolean
        createdAt:
          type: string

    BeastKingdom:
      type: object
      required: [id, name, dominantSpecies, foundedDay, capital, militaryPower, economy, influence, population, territoryCount, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        dominantSpecies:
          type: string
        foundedDay:
          type: integer
        capital:
          type: string
        militaryPower:
          type: integer
        economy:
          type: integer
        influence:
          type: integer
        population:
          type: integer
        territoryCount:
          type: integer
        status:
          type: string
        createdAt:
          type: string

    BeastKingdomDetail:
      allOf:
        - $ref: "#/components/schemas/BeastKingdom"
        - type: object
          properties:
            packs:
              type: array
              items:
                $ref: "#/components/schemas/Pack"
            territories:
              type: array
              items:
                $ref: "#/components/schemas/Territory"
            relations:
              type: array
              items:
                $ref: "#/components/schemas/KingdomRelation"

    Pack:
      type: object
      required: [id, speciesName, territory, population, leaderName, leaderLevel, leaderIntelligence, leaderCharisma, status, createdAt]
      properties:
        id:
          type: integer
        speciesName:
          type: string
        territory:
          type: string
        population:
          type: integer
        leaderName:
          type: string
        leaderLevel:
          type: integer
        leaderIntelligence:
          type: integer
        leaderCharisma:
          type: integer
        kingdomName:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string

    KingdomRelation:
      type: object
      required: [id, kingdomNameA, kingdomNameB, relation, sinceDay, createdAt]
      properties:
        id:
          type: integer
        kingdomNameA:
          type: string
        kingdomNameB:
          type: string
        relation:
          type: string
        sinceDay:
          type: integer
        createdAt:
          type: string

    DNAProfile:
      type: object
      required: [strength, agility, intelligence, vitality, sizeClass, bloodline, mutationChance]
      properties:
        strength:
          type: integer
        agility:
          type: integer
        intelligence:
          type: integer
        vitality:
          type: integer
        sizeClass:
          type: string
        bloodline:
          type: string
        mutationChance:
          type: number

    GeneticsPreview:
      type: object
      required: [childDna, element, name, rank, rankLevel, bloodline, isMutant, mutationSummary, description]
      properties:
        childDna:
          $ref: "#/components/schemas/DNAProfile"
        element:
          type: string
        name:
          type: string
        rank:
          type: string
        rankLevel:
          type: integer
        bloodline:
          type: string
        isMutant:
          type: boolean
        mutationSummary:
          type: string
        description:
          type: string
        parentADna:
          $ref: "#/components/schemas/DNAProfile"
        parentBDna:
          $ref: "#/components/schemas/DNAProfile"
