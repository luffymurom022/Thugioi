openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: THÚ GIỚI AI - World Creature Simulation API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: creatures
  - name: zones
  - name: breeding
  - name: history
  - name: dashboard
  - name: evolution
  - name: genetics
  - name: kingdoms
  - name: territories
  - name: wars
  - name: heroes
  - name: lore
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get world dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /creatures:
    get:
      operationId: listCreatures
      tags: [creatures]
      summary: List all creature species
      parameters:
        - name: zone
          in: query
          schema:
            type: string
        - name: element
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of creatures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Creature"

  /creatures/{id}:
    get:
      operationId: getCreature
      tags: [creatures]
      summary: Get creature detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Creature detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Creature"
        "404":
          description: Not found

  /zones:
    get:
      operationId: listZones
      tags: [zones]
      summary: List all zones with current populations
      responses:
        "200":
          description: List of zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Zone"

  /zones/{id}:
    get:
      operationId: getZone
      tags: [zones]
      summary: Get zone detail with creatures
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Zone detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ZoneDetail"
        "404":
          description: Not found

  /breeding:
    post:
      operationId: breedCreatures
      tags: [breeding]
      summary: Breed two creatures to create a new species
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreedingInput"
      responses:
        "201":
          description: New creature born
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BreedingResult"
        "400":
          description: Invalid breeding pair

  /history:
    get:
      operationId: listHistory
      tags: [history]
      summary: Get world history logs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: History log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEntry"

  /simulation/tick:
    post:
      operationId: simulationTick
      tags: [dashboard]
      summary: Manually trigger a simulation tick
      responses:
        "200":
          description: Tick result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TickResult"

  /evolution-paths:
    get:
      operationId: listEvolutionPaths
      tags: [evolution]
      summary: Get all evolution paths with conditions
      responses:
        "200":
          description: Evolution paths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EvolutionPath"

  /territories:
    get:
      operationId: listTerritories
      tags: [territories]
      summary: List all territories with resources
      responses:
        "200":
          description: Territory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Territory"

  /kingdoms:
    get:
      operationId: listKingdoms
      tags: [kingdoms]
      summary: List all beast kingdoms ranked by influence
      responses:
        "200":
          description: Kingdom list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BeastKingdom"

  /kingdoms/{id}:
    get:
      operationId: getKingdom
      tags: [kingdoms]
      summary: Get kingdom detail with packs, territories, relations, wars and heroes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Kingdom detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeastKingdomDetail"
        "404":
          description: Not found

  /packs:
    get:
      operationId: listPacks
      tags: [kingdoms]
      summary: List all active packs
      responses:
        "200":
          description: Pack list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pack"

  /kingdom-relations:
    get:
      operationId: listKingdomRelations
      tags: [kingdoms]
      summary: List all diplomacy relations between kingdoms
      responses:
        "200":
          description: Relation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KingdomRelation"

  /wars:
    get:
      operationId: listWars
      tags: [wars]
      summary: List all wars (ongoing and historical)
      responses:
        "200":
          description: War list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/War"

  /heroes:
    get:
      operationId: listHeroes
      tags: [heroes]
      summary: List all heroes
      responses:
        "200":
          description: Hero list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Hero"

  /genetics/preview:
    post:
      operationId: previewGenetics
      tags: [genetics]
      summary: Preview DNA fusion of two creatures without saving
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BreedingInput"
      responses:
        "200":
          description: Predicted child DNA and traits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneticsPreview"
        "400":
          description: Invalid input

  /lore/ages:
    get:
      operationId: listLoreAges
      tags: [lore]
      summary: List all world ages/eras
      responses:
        "200":
          description: List of world ages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorldAge"

  /lore/current-age:
    get:
      operationId: getCurrentAge
      tags: [lore]
      summary: Get the current world age
      responses:
        "200":
          description: Current world age
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorldAge"

  /lore/legends:
    get:
      operationId: listLegends
      tags: [lore]
      summary: List all legends
      responses:
        "200":
          description: List of legends
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Legend"

  /lore/myths:
    get:
      operationId: listMyths
      tags: [lore]
      summary: List all myths
      responses:
        "200":
          description: List of myths
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Myth"

  /lore/bloodlines:
    get:
      operationId: listBloodlineHistories
      tags: [lore]
      summary: List all bloodline histories
      responses:
        "200":
          description: List of bloodline histories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BloodlineHistory"

  /lore/books:
    get:
      operationId: listLoreBooks
      tags: [lore]
      summary: List all lore books
      responses:
        "200":
          description: List of lore books
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoreBook"

  /lore/news:
    get:
      operationId: listLoreNews
      tags: [lore]
      summary: List recent lore news articles
      responses:
        "200":
          description: List of news articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoreNews"

  /lore/summary:
    get:
      operationId: getLoreSummary
      tags: [lore]
      summary: Get V7 lore summary for dashboard
      responses:
        "200":
          description: Lore summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoreSummary"

  /lore/generate:
    post:
      operationId: generateLore
      tags: [lore]
      summary: Trigger lore generation from current world data
      responses:
        "200":
          description: Generation triggered
          content:
            application/json:
              schema:
                type: object
                required: [success, worldDay]
                properties:
                  success:
                    type: boolean
                  worldDay:
                    type: integer

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Creature:
      type: object
      required: [id, name, rank, rankLevel, element, habitat, population, lifespan, reproductionRate, description, status, isHybrid, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        rank:
          type: string
        rankLevel:
          type: integer
        element:
          type: string
        habitat:
          type: string
        population:
          type: integer
        lifespan:
          type: integer
        reproductionRate:
          type: number
        description:
          type: string
        status:
          type: string
        isHybrid:
          type: boolean
        parentA:
          type: ["string", "null"]
        parentB:
          type: ["string", "null"]
        createdAt:
          type: string
        energy:
          type: integer
        hunger:
          type: integer
        ageTicks:
          type: integer
        gender:
          type: string
        preySpecies:
          type: string
        predatorSpecies:
          type: string
        generation:
          type: integer
        huntSuccesses:
          type: integer
        evolutionStage:
          type: integer
        evolutionChain:
          type: string
        dietType:
          type: string
        maxPopulation:
          type: integer
        mutationChance:
          type: number
        isMutant:
          type: boolean
        strength:
          type: integer
        agility:
          type: integer
        intelligence:
          type: integer
        vitality:
          type: integer
        sizeClass:
          type: string
        bloodline:
          type: string

    Zone:
      type: object
      required: [id, name, temperature, resources, capacity, currentPopulation]
      properties:
        id:
          type: integer
        name:
          type: string
        temperature:
          type: number
        resources:
          type: string
        capacity:
          type: integer
        currentPopulation:
          type: integer
        description:
          type: string

    ZoneDetail:
      type: object
      required: [id, name, temperature, resources, capacity, currentPopulation, creatures]
      properties:
        id:
          type: integer
        name:
          type: string
        temperature:
          type: number
        resources:
          type: string
        capacity:
          type: integer
        currentPopulation:
          type: integer
        description:
          type: string
        creatures:
          type: array
          items:
            $ref: "#/components/schemas/Creature"

    BreedingInput:
      type: object
      required: [creatureAId, creatureBId]
      properties:
        creatureAId:
          type: integer
        creatureBId:
          type: integer

    BreedingResult:
      type: object
      required: [newCreature, message]
      properties:
        newCreature:
          $ref: "#/components/schemas/Creature"
        message:
          type: string
        isMutant:
          type: boolean
        bloodline:
          type: string

    HistoryEntry:
      type: object
      required: [id, worldDay, eventType, description, createdAt]
      properties:
        id:
          type: integer
        worldDay:
          type: integer
        eventType:
          type: string
        description:
          type: string
        createdAt:
          type: string

    DashboardSummary:
      type: object
      required: [totalSpecies, totalPopulation, extinctSpecies, livingSpecies, worldDay, zoneStats, recentEvents]
      properties:
        totalSpecies:
          type: integer
        totalPopulation:
          type: integer
        extinctSpecies:
          type: integer
        livingSpecies:
          type: integer
        worldDay:
          type: integer
        zoneStats:
          type: array
          items:
            $ref: "#/components/schemas/ZoneStat"
        recentEvents:
          type: array
          items:
            $ref: "#/components/schemas/HistoryEntry"
        strongestSpeciesName:
          type: ["string", "null"]
        mostPopulousSpeciesName:
          type: ["string", "null"]
        mostPopulousCount:
          type: ["integer", "null"]
        newestSpeciesName:
          type: ["string", "null"]
        evolvingSpeciesCount:
          type: ["integer", "null"]
        mutatedSpeciesCount:
          type: ["integer", "null"]
        totalKingdoms:
          type: ["integer", "null"]
        strongestKingdomName:
          type: ["string", "null"]
        richestKingdomName:
          type: ["string", "null"]
        largestKingdomName:
          type: ["string", "null"]
        activeWarsCount:
          type: ["integer", "null"]
        mostAggressiveKingdom:
          type: ["string", "null"]
        totalTerritoriesConquered:
          type: ["integer", "null"]
        activeHeroesCount:
          type: ["integer", "null"]

    ZoneStat:
      type: object
      required: [zoneId, zoneName, population, speciesCount, capacity]
      properties:
        zoneId:
          type: integer
        zoneName:
          type: string
        population:
          type: integer
        speciesCount:
          type: integer
        capacity:
          type: integer

    TickResult:
      type: object
      required: [worldDay, events, populations]
      properties:
        worldDay:
          type: integer
        events:
          type: array
          items:
            type: string
        populations:
          type: array
          items:
            $ref: "#/components/schemas/CreaturePopulation"

    CreaturePopulation:
      type: object
      required: [id, name, population, status]
      properties:
        id:
          type: integer
        name:
          type: string
        population:
          type: integer
        status:
          type: string

    EvolutionPath:
      type: object
      required: [id, fromSpecies, toSpecies, toRank, toRankLevel, toElement, minPopulation, minHuntSuccesses, minAgeTicks, toDescription]
      properties:
        id:
          type: integer
        fromSpecies:
          type: string
        toSpecies:
          type: string
        toRank:
          type: string
        toRankLevel:
          type: integer
        toElement:
          type: string
        toDescription:
          type: string
        minPopulation:
          type: integer
        minHuntSuccesses:
          type: integer
        minAgeTicks:
          type: integer
        createdAt:
          type: string

    Territory:
      type: object
      required: [id, zoneName, food, water, mineral, spirit, foodMax, waterMax, mineralMax, spiritMax, climate, contested, createdAt]
      properties:
        id:
          type: integer
        zoneName:
          type: string
        food:
          type: integer
        water:
          type: integer
        mineral:
          type: integer
        spirit:
          type: integer
        foodMax:
          type: integer
        waterMax:
          type: integer
        mineralMax:
          type: integer
        spiritMax:
          type: integer
        climate:
          type: string
        dominantSpecies:
          type: ["string", "null"]
        controllingKingdom:
          type: ["string", "null"]
        contested:
          type: boolean
        createdAt:
          type: string

    BeastKingdom:
      type: object
      required: [id, name, dominantSpecies, foundedDay, capital, militaryPower, economy, influence, population, territoryCount, status, technologyLevel, morale, warCount, warWins, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        dominantSpecies:
          type: string
        foundedDay:
          type: integer
        capital:
          type: string
        militaryPower:
          type: integer
        economy:
          type: integer
        influence:
          type: integer
        population:
          type: integer
        territoryCount:
          type: integer
        status:
          type: string
        technologyLevel:
          type: integer
        morale:
          type: integer
        warCount:
          type: integer
        warWins:
          type: integer
        createdAt:
          type: string

    BeastKingdomDetail:
      allOf:
        - $ref: "#/components/schemas/BeastKingdom"
        - type: object
          properties:
            packs:
              type: array
              items:
                $ref: "#/components/schemas/Pack"
            territories:
              type: array
              items:
                $ref: "#/components/schemas/Territory"
            relations:
              type: array
              items:
                $ref: "#/components/schemas/KingdomRelation"
            wars:
              type: array
              items:
                $ref: "#/components/schemas/War"
            heroes:
              type: array
              items:
                $ref: "#/components/schemas/Hero"

    Pack:
      type: object
      required: [id, speciesName, territory, population, leaderName, leaderLevel, leaderIntelligence, leaderCharisma, status, createdAt]
      properties:
        id:
          type: integer
        speciesName:
          type: string
        territory:
          type: string
        population:
          type: integer
        leaderName:
          type: string
        leaderLevel:
          type: integer
        leaderIntelligence:
          type: integer
        leaderCharisma:
          type: integer
        kingdomName:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string

    KingdomRelation:
      type: object
      required: [id, kingdomNameA, kingdomNameB, relation, sinceDay, createdAt]
      properties:
        id:
          type: integer
        kingdomNameA:
          type: string
        kingdomNameB:
          type: string
        relation:
          type: string
        sinceDay:
          type: integer
        createdAt:
          type: string

    War:
      type: object
      required: [id, attackerKingdom, defenderKingdom, status, startDay, resultDescription, attackerCasualties, defenderCasualties, createdAt]
      properties:
        id:
          type: integer
        attackerKingdom:
          type: string
        defenderKingdom:
          type: string
        status:
          type: string
        startDay:
          type: integer
        endDay:
          type: ["integer", "null"]
        territoryWon:
          type: ["string", "null"]
        attackerCasualties:
          type: integer
        defenderCasualties:
          type: integer
        resultDescription:
          type: string
        createdAt:
          type: string

    Hero:
      type: object
      required: [id, name, kingdomName, level, ability, militaryBonus, moraleBonus, status, bornDay, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        kingdomName:
          type: string
        level:
          type: integer
        ability:
          type: string
        militaryBonus:
          type: integer
        moraleBonus:
          type: integer
        status:
          type: string
        bornDay:
          type: integer
        createdAt:
          type: string

    DNAProfile:
      type: object
      required: [strength, agility, intelligence, vitality, sizeClass, bloodline, mutationChance]
      properties:
        strength:
          type: integer
        agility:
          type: integer
        intelligence:
          type: integer
        vitality:
          type: integer
        sizeClass:
          type: string
        bloodline:
          type: string
        mutationChance:
          type: number

    GeneticsPreview:
      type: object
      required: [childDna, element, name, rank, rankLevel, bloodline, isMutant, mutationSummary, description]
      properties:
        childDna:
          $ref: "#/components/schemas/DNAProfile"
        element:
          type: string
        name:
          type: string
        rank:
          type: string
        rankLevel:
          type: integer
        bloodline:
          type: string
        isMutant:
          type: boolean
        mutationSummary:
          type: string
        description:
          type: string
        parentADna:
          $ref: "#/components/schemas/DNAProfile"
        parentBDna:
          $ref: "#/components/schemas/DNAProfile"

    WorldAge:
      type: object
      required: [id, name, startDay, description, trigger, isCurrent, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        startDay:
          type: integer
        endDay:
          type: ["integer", "null"]
        description:
          type: string
        trigger:
          type: string
        isCurrent:
          type: boolean
        createdAt:
          type: string

    Legend:
      type: object
      required: [id, title, content, category, relatedEntity, worldDay, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        category:
          type: string
        sourceEventId:
          type: ["integer", "null"]
        relatedEntity:
          type: string
        worldDay:
          type: integer
        createdAt:
          type: string

    Myth:
      type: object
      required: [id, title, content, subject, subjectName, worldDay, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        subject:
          type: string
        subjectName:
          type: string
        worldDay:
          type: integer
        createdAt:
          type: string

    BloodlineHistory:
      type: object
      required: [id, bloodlineName, ancestorName, totalAgeTicks, peakPopulation, content, createdAt]
      properties:
        id:
          type: integer
        bloodlineName:
          type: string
        ancestorName:
          type: string
        totalAgeTicks:
          type: integer
        peakPopulation:
          type: integer
        content:
          type: string
        createdAt:
          type: string

    LoreBook:
      type: object
      required: [id, title, category, content, worldDay, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        category:
          type: string
        content:
          type: string
        worldDay:
          type: integer
        createdAt:
          type: string

    LoreNews:
      type: object
      required: [id, headline, content, category, worldDay, createdAt]
      properties:
        id:
          type: integer
        headline:
          type: string
        content:
          type: string
        category:
          type: string
        worldDay:
          type: integer
        createdAt:
          type: string

    LoreSummary:
      type: object
      required: [currentAge, currentAgeDescription, currentAgeStartDay, strongestBloodline]
      properties:
        currentAge:
          type: string
        currentAgeDescription:
          type: string
        currentAgeStartDay:
          type: integer
        famousHeroName:
          type: ["string", "null"]
        famousHeroKingdom:
          type: ["string", "null"]
        famousHeroLevel:
          type: ["integer", "null"]
        strongestBloodline:
          type: string
        largestHistoricalKingdomName:
          type: ["string", "null"]
        latestLegendTitle:
          type: ["string", "null"]
        latestNewsHeadline:
          type: ["string", "null"]
